---
# DUNE Near Detector LAr (ND-LAr / ArgonCube) Configuration
# References: arXiv:2103.13910 (ND CDR), arXiv:2403.03212 (Module-0),
#             arXiv:2509.07012 (2x2 Demonstrator), dunendggd GDML configs
#
# 35 modules in a 7x5 grid (7 along beam z, 5 transverse x)
# Each module: dual-drift with central cathode, 46.79 cm drift per side
# Module footprint: 100 cm x 100 cm, height: ~303 cm active
# G10 walls + structure: ~2.9 cm per side, ~5.8 cm dead between modules
#
# NOTE: Real ND-LAr uses LArPix pixel readout (4mm pitch), NOT wire planes.
# This config approximates the readout with SBND-style wire planes
# (3 planes at +60/-60/0 deg, 3mm pitch) for use with the JAXTPC framework.
#
# Coordinate system:
#   x = transverse to beam (drift direction within each module)
#   y = vertical (height)
#   z = beam direction
#
# Total: 70 drift volumes (35 modules x 2 drifts each)
volumes:
